services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scheduler_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scheduler_password}
      POSTGRES_DB: ${POSTGRES_DB:-scheduler_db}
    ports:
      - "5433:5432"
    volumes:
      - ./postgres-init:/docker-entrypoint-initdb.d

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
  
  scheduler:
    build:
      context: ./scheduler
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    depends_on:
      - redis
  
  scheduler-2:
    build:
      context: ./scheduler
      dockerfile: Dockerfile
    ports:
      - "8003:8001"
    depends_on:
      - redis
      
  node-manager:
    build:
      context: ./node-manager
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    depends_on:
      - redis
  
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gateway
      - scheduler
      - scheduler-2
      - node-manager