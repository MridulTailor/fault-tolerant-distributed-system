services:
  service-a:
    build:
      context: ./service-a
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
  
  service-b:
    build:
      context: ./service-b
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
  
  service-b-2:
    build:
      context: ./service-b
      dockerfile: Dockerfile
    ports:
      - "8003:8001"
      
  service-c:
    build:
      context: ./service-c
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
  
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - service-a
      - service-b
      - service-b-2
      - service-c