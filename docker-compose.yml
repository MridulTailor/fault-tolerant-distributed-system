services:
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
  
  scheduler:
    build:
      context: ./scheduler
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
  
  scheduler-2:
    build:
      context: ./scheduler
      dockerfile: Dockerfile
    ports:
      - "8003:8001"
      
  node-manager:
    build:
      context: ./node-manager
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
  
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gateway
      - scheduler
      - scheduler-2
      - node-manager